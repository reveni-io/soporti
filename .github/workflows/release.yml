name: Release

# On every merge to main, tag the commit with the root package.json version and
# publish a GitHub Release with auto-generated notes. version-check.yml guarantees
# each merged PR carries a new version, so the tag never collides; the guard below
# just skips no-op pushes (e.g. a direct push that did not change the version).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-release:
    name: Tag & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to release."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
