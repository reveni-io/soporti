# Blueprint for the "Deploy to Render" button in the README:
#   https://render.com/deploy?repo=https://github.com/reveni-io/soporti
#
# Provisions the split shape: the server as a Docker web service, the client
# as a static site pointing at it via VITE_API_URL, plus a managed PostgreSQL
# database. JWT_SECRET is auto-generated by Render.
#
# Client and server live on different origins here, so after the first deploy
# set CORS_ORIGIN on soporti-server to the client's URL — see
# docs/deployment.md. Everything else (OpenAI key/model, integrations, users)
# is configured from the /admin panel after the first boot.
services:
  - type: web
    name: soporti-server
    runtime: docker
    rootDir: server
    plan: starter
    healthCheckPath: /api/auth/methods
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: soporti-db
          property: connectionString

  - type: web
    name: soporti-client
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # SPA fallback: serve index.html for every client-side route.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Build-time API base URL, wired to the server's public URL.
      - key: VITE_API_URL
        fromService:
          type: web
          name: soporti-server
          envVarKey: RENDER_EXTERNAL_URL
      # Only needed for Google sign-in (off by default). Must match the
      # client id saved in /admin -> Authentication.
      - key: VITE_GOOGLE_CLIENT_ID
        value: ''

databases:
  - name: soporti-db
    # Durable default. Switch to `free` for a throwaway trial — free
    # databases expire after ~30 days, taking users and config with them.
    plan: basic-256mb
