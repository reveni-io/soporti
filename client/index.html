<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soporti</title>
    <meta
      name="description"
      content="Soporti is an AI teammate for support and engineering teams — it reads the code, queries production data, and searches docs, tickets and errors, then explains what it finds in plain language."
    />

    <!-- Favicons (Reveni brand) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph — social preview shown for any page of this SPA (Slack, etc.).
         og:url and og:image need absolute URLs, so set them per deployment
         (e.g. https://soporti.example.com/ and .../og-image.png). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Soporti" />
    <meta property="og:title" content="Soporti — Your AI teammate for code, data & docs" />
    <meta
      property="og:description"
      content="Ask anything about how your product works. Soporti reads the code, queries data, and searches docs, tickets and errors — then explains it in plain language. Read-only and safe."
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Soporti — Your AI teammate for code, data & docs" />
    <meta
      name="twitter:description"
      content="Ask anything about how your product works — code, data, docs, tickets and errors, explained in plain language."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Shippori+Mincho:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
